<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suporte Remoto — Técnico</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#161b27;border-bottom:1px solid #2d3748}
.logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:#fff}
.logo i{color:#4299e1}
.status{display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 12px;border-radius:999px;background:#1a202c}
.status.online{color:#68d391}.status.offline{color:#718096}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.main{display:grid;grid-template-columns:200px 1fr 220px;flex:1;overflow:hidden}
.sidebar{background:#161b27;border-right:1px solid #2d3748;padding:12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.sec-title{font-size:10px;color:#4a5568;letter-spacing:.08em;text-transform:uppercase;padding:8px 6px 4px}
.ctrl{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;border:none;background:transparent;color:#a0aec0;cursor:pointer;font-size:12px;width:100%;text-align:left}
.ctrl:hover{background:#1e2433;color:#e2e8f0}
.ctrl i{font-size:15px;color:#4a5568;flex-shrink:0}
.ctrl.danger:hover{background:#2d1515;color:#fc8181}
.ctrl.danger:hover i{color:#fc8181}
.center{display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px;overflow:auto}
.device{width:210px;height:400px;background:#1a202c;border:2px solid #2d3748;border-radius:28px;position:relative;overflow:hidden;flex-shrink:0}
.screen{width:100%;height:100%;background:#0d1117;display:flex;align-items:center;justify-content:center;cursor:crosshair;position:relative}
#stream-img{width:100%;height:100%;object-fit:contain;display:none}
.screen-placeholder{text-align:center;color:#2d3748}
.screen-placeholder i{font-size:36px;display:block;margin-bottom:8px}
.screen-placeholder p{font-size:11px}
.dpad{display:grid;grid-template-columns:repeat(3,36px);grid-template-rows:repeat(3,36px);gap:3px}
.dp{background:#1e2433;border:1px solid #2d3748;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#718096;font-size:14px}
.dp:hover{background:#2d3748;color:#e2e8f0}
.dp.center{background:#252d3d}
.tools{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.tbtn{padding:6px 10px;background:#1e2433;border:1px solid #2d3748;border-radius:8px;color:#a0aec0;cursor:pointer;font-size:11px;display:flex;align-items:center;gap:4px}
.tbtn:hover{background:#2d3748;color:#fff}
.tbtn i{font-size:13px}
.txt-row{display:flex;gap:6px;width:100%}
.txt-row input{flex:1;background:#1e2433;border:1px solid #2d3748;border-radius:8px;padding:7px 10px;color:#e2e8f0;font-size:12px;outline:none}
.txt-row input:focus{border-color:#4299e1}
.txt-row button{padding:7px 12px;background:#4299e1;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px}
.txt-row button:hover{background:#3182ce}
.right{border-left:1px solid #2d3748;background:#161b27;padding:12px;display:flex;flex-direction:column;overflow:hidden}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1e2433;font-size:11px}
.stat-label{color:#4a5568}
.stat-val{color:#e2e8f0;font-weight:500}
.session-box{background:#1a202c;border:1px solid #2d3748;border-radius:8px;padding:10px;margin-top:8px}
.session-label{font-size:10px;color:#4a5568;margin-bottom:4px}
.session-link{font-size:11px;color:#4299e1;word-break:break-all}
.log{flex:1;overflow-y:auto;margin-top:8px}
.log-entry{font-size:10px;padding:3px 0;border-bottom:1px solid #1a202c;color:#718096}
.log-entry .ts{color:#2d3748;margin-right:6px}
.log-entry.ev{color:#68d391}
.log-entry.err{color:#fc8181}
.gen-btn{width:100%;padding:8px;background:#4299e1;border:none;border-radius:8px;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px}
.gen-btn:hover{background:#3182ce}
.copy-btn{font-size:10px;padding:3px 8px;background:#1e2433;border:1px solid #2d3748;border-radius:6px;color:#a0aec0;cursor:pointer;margin-top:4px}
.copy-btn:hover{background:#2d3748;color:#fff}
.vol-row{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px;color:#718096}
.vol-row input[type=range]{flex:1;accent-color:#4299e1}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><i class="ti ti-device-laptop"></i> Suporte Remoto</div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="status offline" id="status-badge"><span class="dot"></span> Desconectado</span>
    <span style="font-size:11px;color:#4a5568" id="session-id-top">Sem sessão</span>
  </div>
</div>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <p class="sec-title">Sistema</p>
    <button class="ctrl" onclick="send({tipo:'cmd',cmd:'home'})"><i class="ti ti-home"></i> Home</button>
    <button class="ctrl" onclick="send({tipo:'cmd',cmd:'back'})"><i class="ti ti-arrow-left"></i> Voltar</button>
    <button class="ctrl" onclick="send({tipo:'cmd',cmd:'recents'})"><i class="ti ti-layout-grid"></i> Recentes</button>
    <button class="ctrl" onclick="send({tipo:'cmd',cmd:'lock'})"><i class="ti ti-lock"></i> Bloquear</button>
    <button class="ctrl" onclick="send({tipo:'cmd',cmd:'notifications'})"><i class="ti ti-bell"></i> Notificações</button>
    <button class="ctrl" onclick="send({tipo:'cmd',cmd:'settings'})"><i class="ti ti-settings"></i> Configurações</button>
    <button class="ctrl" onclick="send({tipo:'cmd',cmd:'camera'})"><i class="ti ti-camera"></i> Câmera</button>

    <p class="sec-title">Wi-Fi / Bluetooth</p>
    <button class="ctrl" onclick="send({tipo:'cmd',cmd:'wifi_on'})"><i class="ti ti-wifi"></i> Wi-Fi ON</button>
    <button class="ctrl" onclick="send({tipo:'cmd',cmd:'wifi_off'})"><i class="ti ti-wifi-off"></i> Wi-Fi OFF</button>
    <button class="ctrl" onclick="send({tipo:'cmd',cmd:'bt_on'})"><i class="ti ti-bluetooth"></i> BT ON</button>
    <button class="ctrl" onclick="send({tipo:'cmd',cmd:'bt_off'})"><i class="ti ti-bluetooth-off"></i> BT OFF</button>

    <p class="sec-title">Volume</p>
    <div class="vol-row"><i class="ti ti-volume"></i><input type="range" min="0" max="15" value="5" oninput="send({tipo:'volume',valor:+this.value})"></div>
    <div class="vol-row"><i class="ti ti-brightness"></i><input type="range" min="0" max="255" value="120" oninput="send({tipo:'brilho',valor:+this.value})"></div>

    <p class="sec-title">Sessão</p>
    <button class="ctrl danger" onclick="encerrar()"><i class="ti ti-plug-x"></i> Encerrar sessão</button>
  </div>

  <!-- Centro -->
  <div class="center">
    <div class="device">
      <div class="screen" id="screen" onclick="handleToque(event)">
        <img id="stream-img" alt="Tela do dispositivo">
        <div class="screen-placeholder" id="placeholder">
          <i class="ti ti-device-mobile"></i>
          <p>Aguardando conexão...</p>
        </div>
      </div>
    </div>

    <div class="dpad">
      <div></div>
      <button class="dp" onclick="send({tipo:'dpad',dir:'up'})"><i class="ti ti-chevron-up"></i></button>
      <div></div>
      <button class="dp" onclick="send({tipo:'dpad',dir:'left'})"><i class="ti ti-chevron-left"></i></button>
      <button class="dp center" onclick="send({tipo:'dpad',dir:'ok'})"><i class="ti ti-check"></i></button>
      <button class="dp" onclick="send({tipo:'dpad',dir:'right'})"><i class="ti ti-chevron-right"></i></button>
      <div></div>
      <button class="dp" onclick="send({tipo:'dpad',dir:'down'})"><i class="ti ti-chevron-down"></i></button>
      <div></div>
    </div>

    <div class="tools">
      <button class="tbtn" onclick="send({tipo:'screenshot'})"><i class="ti ti-screenshot"></i> Print</button>
      <button class="tbtn" onclick="toggleStream()"><i class="ti ti-player-play" id="stream-icon"></i> <span id="stream-label">Stream</span></button>
      <button class="tbtn" onclick="send({tipo:'swipe',dir:'up'})"><i class="ti ti-arrow-narrow-up"></i> Swipe ↑</button>
      <button class="tbtn" onclick="send({tipo:'swipe',dir:'down'})"><i class="ti ti-arrow-narrow-down"></i> Swipe ↓</button>
    </div>

    <div class="txt-row">
      <input type="text" id="txt" placeholder="Enviar texto ao dispositivo..." onkeydown="if(event.key==='Enter')enviarTexto()">
      <button onclick="enviarTexto()"><i class="ti ti-send"></i></button>
    </div>
  </div>

  <!-- Direita -->
  <div class="right">
    <p class="sec-title">Status do dispositivo</p>
    <div class="stat-row"><span class="stat-label">Bateria</span><span class="stat-val" id="d-bat">—</span></div>
    <div class="stat-row"><span class="stat-label">RAM</span><span class="stat-val" id="d-ram">—</span></div>
    <div class="stat-row"><span class="stat-label">Wi-Fi</span><span class="stat-val" id="d-wifi">—</span></div>
    <div class="stat-row"><span class="stat-label">Android</span><span class="stat-val" id="d-os">—</span></div>
    <div class="stat-row"><span class="stat-label">Modelo</span><span class="stat-val" id="d-model">—</span></div>

    <button class="gen-btn" onclick="gerarSessao()"><i class="ti ti-link"></i> Gerar nova sessão</button>
    <div class="session-box">
      <p class="session-label">Link para o cliente</p>
      <p class="session-link" id="link-display">Clique em "Gerar nova sessão"</p>
      <button class="copy-btn" onclick="copiarLink()"><i class="ti ti-copy"></i> Copiar link</button>
    </div>

    <p class="sec-title" style="margin-top:12px">Log da sessão</p>
    <div class="log" id="log"></div>
  </div>
</div>

<script>
const SERVER = window.location.origin.replace(/^http/, 'ws');
let ws = null;
let sessionId = null;
let streaming = false;
let linkAtual = '';

function log(msg, tipo=''){
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = 'log-entry ' + tipo;
  const t = new Date().toLocaleTimeString('pt-BR');
  d.innerHTML = `<span class="ts">${t}</span>${msg}`;
  el.prepend(d);
}

async function gerarSessao(){
  try {
    const r = await fetch('/api/sessao/criar', {method:'POST'});
    const data = await r.json();
    sessionId = data.sessionId;
    linkAtual = data.link;
    document.getElementById('link-display').textContent = data.link;
    document.getElementById('session-id-top').textContent = `Sessão: ${sessionId}`;
    log(`Sessão ${sessionId} criada`, 'ev');
    conectarWS();
  } catch(e) {
    log('Erro ao criar sessão: ' + e.message, 'err');
  }
}

function conectarWS(){
  if(ws) ws.close();
  ws = new WebSocket(`${SERVER}?s=${sessionId}&papel=tecnico`);

  ws.onopen = () => {
    log('Painel conectado ao servidor', 'ev');
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch(msg.tipo){
      case 'par_conectado':
        log('Cliente conectou!', 'ev');
        break;
      case 'par_desconectado':
        setOffline();
        log('Cliente desconectou', 'err');
        break;
      case 'consentimento':
        if(msg.aceito){
          setOnline();
          atualizarDispositivo(msg.dispositivo);
          log('Usuário ACEITOU a conexão ✓', 'ev');
        } else {
          log('Usuário RECUSOU a conexão', 'err');
        }
        break;
      case 'frame_tela':
        mostrarFrame(msg.frame);
        break;
      case 'info_dispositivo':
        atualizarDispositivo(msg.dados);
        break;
    }
  };

  ws.onclose = () => log('WebSocket desconectado', 'err');
  ws.onerror = () => log('Erro na conexão WS', 'err');
}

function send(msg){
  if(!ws || ws.readyState !== WebSocket.OPEN){
    log('Sem conexão ativa', 'err');
    return;
  }
  ws.send(JSON.stringify(msg));
  log(`→ ${msg.tipo}${msg.cmd?' '+msg.cmd:''}${msg.dir?' '+msg.dir:''}`);
}

function handleToque(e){
  const rect = e.currentTarget.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
  const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
  send({tipo:'toque', x:+x, y:+y});
}

function toggleStream(){
  streaming = !streaming;
  send({tipo: streaming ? 'stream_start' : 'stream_stop'});
  document.getElementById('stream-icon').className = streaming ? 'ti ti-player-pause' : 'ti ti-player-play';
  document.getElementById('stream-label').textContent = streaming ? 'Parar' : 'Stream';
}

function mostrarFrame(base64){
  const img = document.getElementById('stream-img');
  img.src = 'data:image/jpeg;base64,' + base64;
  img.style.display = 'block';
  document.getElementById('placeholder').style.display = 'none';
}

function enviarTexto(){
  const v = document.getElementById('txt').value;
  if(v){ send({tipo:'texto', valor:v}); document.getElementById('txt').value=''; }
}

function atualizarDispositivo(info){
  if(!info) return;
  document.getElementById('d-bat').textContent = info.bateria || '—';
  document.getElementById('d-ram').textContent = info.ram || '—';
  document.getElementById('d-wifi').textContent = info.wifi || '—';
  document.getElementById('d-os').textContent = info.android || '—';
  document.getElementById('d-model').textContent = info.modelo || '—';
}

function setOnline(){
  const b = document.getElementById('status-badge');
  b.className = 'status online';
  b.innerHTML = '<span class="dot"></span> Conectado';
}
function setOffline(){
  const b = document.getElementById('status-badge');
  b.className = 'status offline';
  b.innerHTML = '<span class="dot"></span> Desconectado';
}

function encerrar(){
  send({tipo:'encerrar'});
  if(ws) ws.close();
  setOffline();
  log('Sessão encerrada', 'err');
}

function copiarLink(){
  if(linkAtual){ navigator.clipboard.writeText(linkAtual); log('Link copiado!'); }
}
</script>
</body>
</html>
