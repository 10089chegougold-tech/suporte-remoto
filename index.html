<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suporte Remoto — Técnico</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#161b27;border-bottom:1px solid #2d3748}
.logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:#fff}
.logo i{color:#4299e1}
.status{display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 12px;border-radius:999px;background:#1a202c}
.status.online{color:#68d391}.status.offline{color:#718096}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.sidebar{background:#161b27;border-right:1px solid #2d3748;padding:12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.sec-title{font-size:10px;color:#4a5568;letter-spacing:.08em;text-transform:uppercase;padding:8px 6px 4px}
.ctrl{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;border:none;background:transparent;color:#a0aec0;cursor:pointer;font-size:12px;width:100%;text-align:left}
.ctrl:hover{background:#1e2433;color:#e2e8f0}
.ctrl i{font-size:15px;color:#4a5568;flex-shrink:0}
.ctrl.danger:hover{background:#2d1515;color:#fc8181}
.ctrl.danger:hover i{color:#fc8181}
.center{display:flex;flex-direction:column;align-items:center;padding:12px 20px;gap:8px;overflow:auto}
.device{background:#1a202c;border:2px solid #2d3748;border-radius:28px;position:relative;overflow:hidden;flex-shrink:0}
.screen{width:100%;height:100%;background:#0d1117;display:flex;align-items:center;justify-content:center;cursor:crosshair;position:relative}
#stream-img{width:100%;height:100%;object-fit:contain;display:none}
.screen-placeholder{text-align:center;color:#2d3748}
.screen-placeholder i{font-size:36px;display:block;margin-bottom:8px}
.screen-placeholder p{font-size:11px}
.nav-bar{display:flex;gap:6px;justify-content:center}
.nav-btn{padding:8px 16px;background:#1e2433;border:1px solid #2d3748;border-radius:10px;color:#a0aec0;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px;flex-direction:column}
.nav-btn:hover{background:#2d3748;color:#fff}
.nav-btn i{font-size:18px}
.nav-btn span{font-size:9px}
.kb-preview{background:#0d1117;border:1px solid #2d3748;border-radius:8px;padding:6px 10px;font-size:13px;color:#e2e8f0;min-height:32px;width:100%;letter-spacing:1px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.kb-preview span{flex:1;word-break:break-all}
.kb-preview button{background:#4299e1;border:none;border-radius:6px;color:#fff;cursor:pointer;padding:4px 10px;font-size:11px;white-space:nowrap}
.kb-preview button:hover{background:#3182ce}
.keyboard{background:#1a202c;border:1px solid #2d3748;border-radius:12px;padding:8px;width:100%}
.kb-row{display:flex;gap:4px;margin-bottom:4px;justify-content:center}
.kb-key{background:#252d3d;border:1px solid #2d3748;border-radius:6px;color:#e2e8f0;cursor:pointer;font-size:12px;padding:6px 4px;min-width:28px;text-align:center;flex:1;max-width:36px}
.kb-key:hover{background:#2d3748}
.kb-key:active{background:#4299e1;transform:scale(0.95)}
.kb-key.wide{max-width:60px;font-size:10px}
.kb-key.space{max-width:160px;flex:4}
.kb-key.send-btn{background:#4299e1;color:#fff;max-width:60px}
.kb-key.send-btn:hover{background:#3182ce}
.right{border-left:1px solid #2d3748;background:#161b27;padding:12px;display:flex;flex-direction:column;overflow:hidden}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1e2433;font-size:11px}
.stat-label{color:#4a5568}.stat-val{color:#e2e8f0;font-weight:500}
.log{flex:1;overflow-y:auto;margin-top:8px}
.log-entry{font-size:10px;padding:3px 0;border-bottom:1px solid #1a202c;color:#718096}
.log-entry .ts{color:#2d3748;margin-right:6px}
.log-entry.ev{color:#68d391}.log-entry.err{color:#fc8181}
.vol-row{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px;color:#718096}
.vol-row input[type=range]{flex:1;accent-color:#4299e1}
#tela-clientes{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;padding:20px}
#tela-clientes h2{font-size:14px;color:#a0aec0}
.cliente-card{background:#1e2433;border:1px solid #2d3748;border-radius:12px;padding:12px 16px;width:320px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.cliente-info{font-size:12px;color:#a0aec0;line-height:1.6}
.cliente-info strong{color:#e2e8f0;font-size:13px}
.btn-atender{padding:7px 14px;background:#4299e1;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:12px;white-space:nowrap}
.btn-atender:hover{background:#3182ce}
.sem-clientes{color:#4a5568;font-size:13px;text-align:center}
.sem-clientes i{font-size:32px;display:block;margin-bottom:8px}
#tela-painel{display:none;flex:1;overflow:hidden}
.tela-painel-inner{display:grid;grid-template-columns:200px 1fr 220px;height:100%}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><i class="ti ti-device-laptop"></i> Suporte Remoto</div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="status offline" id="status-badge"><span class="dot"></span> Desconectado</span>
    <span style="font-size:11px;color:#4a5568" id="session-id-top"></span>
    <button id="btn-voltar" onclick="voltarLista()" style="display:none;padding:4px 10px;background:#1e2433;border:1px solid #2d3748;border-radius:6px;color:#a0aec0;cursor:pointer;font-size:11px">
      <i class="ti ti-arrow-left"></i> Voltar
    </button>
  </div>
</div>

<div style="display:flex;flex:1;overflow:hidden">
  <div id="tela-clientes">
    <h2><i class="ti ti-devices" style="margin-right:6px"></i>Clientes aguardando atendimento</h2>
    <div id="lista-clientes">
      <div class="sem-clientes"><i class="ti ti-device-mobile-off"></i>Nenhum cliente conectado</div>
    </div>
  </div>

  <div id="tela-painel">
    <div class="tela-painel-inner">
      <div class="sidebar">
        <p class="sec-title">Sistema</p>
        <button class="ctrl" onclick="sendCmd('home')"><i class="ti ti-home"></i> Home</button>
        <button class="ctrl" onclick="sendCmd('back')"><i class="ti ti-arrow-left"></i> Voltar</button>
        <button class="ctrl" onclick="sendCmd('recents')"><i class="ti ti-layout-grid"></i> Recentes</button>
        <button class="ctrl" onclick="sendCmd('lock')"><i class="ti ti-lock"></i> Bloquear</button>
        <button class="ctrl" onclick="sendCmd('notifications')"><i class="ti ti-bell"></i> Notificações</button>
        <button class="ctrl" onclick="sendCmd('settings')"><i class="ti ti-settings"></i> Configurações</button>
        <button class="ctrl" onclick="sendCmd('camera')"><i class="ti ti-camera"></i> Câmera</button>
        <p class="sec-title">Wi-Fi / Bluetooth</p>
        <button class="ctrl" onclick="sendCmd('wifi_on')"><i class="ti ti-wifi"></i> Wi-Fi ON</button>
        <button class="ctrl" onclick="sendCmd('wifi_off')"><i class="ti ti-wifi-off"></i> Wi-Fi OFF</button>
        <button class="ctrl" onclick="sendCmd('bt_on')"><i class="ti ti-bluetooth"></i> BT ON</button>
        <button class="ctrl" onclick="sendCmd('bt_off')"><i class="ti ti-bluetooth-off"></i> BT OFF</button>
        <p class="sec-title">Volume</p>
        <div class="vol-row"><i class="ti ti-volume"></i><input type="range" min="0" max="15" value="5" oninput="send({tipo:'volume',valor:+this.value})"></div>
        <div class="vol-row"><i class="ti ti-brightness"></i><input type="range" min="0" max="255" value="120" oninput="send({tipo:'brilho',valor:+this.value})"></div>
        <p class="sec-title">Sessão</p>
        <button class="ctrl danger" onclick="encerrar()"><i class="ti ti-plug-x"></i> Encerrar sessão</button>
      </div>

      <div class="center">
        <div class="device" id="device-wrap">
          <div class="screen" id="screen" onclick="handleToque(event)">
            <img id="stream-img" alt="Tela do dispositivo">
            <div class="screen-placeholder" id="placeholder">
              <i class="ti ti-device-mobile"></i>
              <p>Aguardando stream...</p>
            </div>
          </div>
        </div>

        <div class="nav-bar">
          <button class="nav-btn" onclick="sendCmd('back')"><i class="ti ti-arrow-left"></i><span>Voltar</span></button>
          <button class="nav-btn" onclick="sendCmd('home')"><i class="ti ti-circle"></i><span>Home</span></button>
          <button class="nav-btn" onclick="sendCmd('recents')"><i class="ti ti-square"></i><span>Recentes</span></button>
          <button class="nav-btn" onclick="send({tipo:'swipe',dir:'up'})"><i class="ti ti-arrow-up"></i><span>Swipe ↑</span></button>
          <button class="nav-btn" onclick="send({tipo:'swipe',dir:'down'})"><i class="ti ti-arrow-down"></i><span>Swipe ↓</span></button>
          <button class="nav-btn" onclick="toggleStream()"><i class="ti ti-player-play" id="stream-icon"></i><span id="stream-label">Stream</span></button>
        </div>

        <!-- Preview do texto acumulado -->
        <div class="kb-preview">
          <span id="kb-preview-text" style="color:#4a5568">Digite e pressione ↵ para enviar...</span>
          <button onclick="enviarTextoAcumulado()">Enviar ↵</button>
        </div>

        <div class="keyboard">
          <div class="kb-row">
            <button class="kb-key" onclick="kbTap('1')">1</button>
            <button class="kb-key" onclick="kbTap('2')">2</button>
            <button class="kb-key" onclick="kbTap('3')">3</button>
            <button class="kb-key" onclick="kbTap('4')">4</button>
            <button class="kb-key" onclick="kbTap('5')">5</button>
            <button class="kb-key" onclick="kbTap('6')">6</button>
            <button class="kb-key" onclick="kbTap('7')">7</button>
            <button class="kb-key" onclick="kbTap('8')">8</button>
            <button class="kb-key" onclick="kbTap('9')">9</button>
            <button class="kb-key" onclick="kbTap('0')">0</button>
            <button class="kb-key wide" onclick="kbSpecial('del')">⌫</button>
          </div>
          <div class="kb-row">
            <button class="kb-key" onclick="kbTap('q')">q</button>
            <button class="kb-key" onclick="kbTap('w')">w</button>
            <button class="kb-key" onclick="kbTap('e')">e</button>
            <button class="kb-key" onclick="kbTap('r')">r</button>
            <button class="kb-key" onclick="kbTap('t')">t</button>
            <button class="kb-key" onclick="kbTap('y')">y</button>
            <button class="kb-key" onclick="kbTap('u')">u</button>
            <button class="kb-key" onclick="kbTap('i')">i</button>
            <button class="kb-key" onclick="kbTap('o')">o</button>
            <button class="kb-key" onclick="kbTap('p')">p</button>
          </div>
          <div class="kb-row">
            <button class="kb-key" onclick="kbTap('a')">a</button>
            <button class="kb-key" onclick="kbTap('s')">s</button>
            <button class="kb-key" onclick="kbTap('d')">d</button>
            <button class="kb-key" onclick="kbTap('f')">f</button>
            <button class="kb-key" onclick="kbTap('g')">g</button>
            <button class="kb-key" onclick="kbTap('h')">h</button>
            <button class="kb-key" onclick="kbTap('j')">j</button>
            <button class="kb-key" onclick="kbTap('k')">k</button>
            <button class="kb-key" onclick="kbTap('l')">l</button>
            <button class="kb-key wide send-btn" onclick="enviarTextoAcumulado()">↵</button>
          </div>
          <div class="kb-row">
            <button class="kb-key" onclick="kbTap('z')">z</button>
            <button class="kb-key" onclick="kbTap('x')">x</button>
            <button class="kb-key" onclick="kbTap('c')">c</button>
            <button class="kb-key" onclick="kbTap('v')">v</button>
            <button class="kb-key" onclick="kbTap('b')">b</button>
            <button class="kb-key" onclick="kbTap('n')">n</button>
            <button class="kb-key" onclick="kbTap('m')">m</button>
            <button class="kb-key" onclick="kbTap('.')">.</button>
            <button class="kb-key" onclick="kbTap(',')">,'</button>
            <button class="kb-key" onclick="kbTap('@')">@</button>
          </div>
          <div class="kb-row">
            <button class="kb-key wide" onclick="kbSpecial('limpar')" style="color:#fc8181">✕</button>
            <button class="kb-key space" onclick="kbTap(' ')">Espaço</button>
            <button class="kb-key wide send-btn" onclick="enviarTextoAcumulado()">Enviar</button>
          </div>
        </div>
      </div>

      <div class="right">
        <p class="sec-title">Status do dispositivo</p>
        <div class="stat-row"><span class="stat-label">Bateria</span><span class="stat-val" id="d-bat">—</span></div>
        <div class="stat-row"><span class="stat-label">RAM</span><span class="stat-val" id="d-ram">—</span></div>
        <div class="stat-row"><span class="stat-label">Wi-Fi</span><span class="stat-val" id="d-wifi">—</span></div>
        <div class="stat-row"><span class="stat-label">Android</span><span class="stat-val" id="d-os">—</span></div>
        <div class="stat-row"><span class="stat-label">Modelo</span><span class="stat-val" id="d-model">—</span></div>
        <div class="stat-row"><span class="stat-label">Resolução</span><span class="stat-val" id="d-res">—</span></div>
        <p class="sec-title" style="margin-top:12px">Log da sessão</p>
        <div class="log" id="log"></div>
      </div>
    </div>
  </div>
</div>

<script>
const SERVER = window.location.origin.replace(/^http/, 'ws');
let ws = null, deviceAtual = null, streaming = false;
let dispositivoLargura = 0, dispositivoAltura = 0;
let textoAcumulado = '';

function log(msg, tipo=''){
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = 'log-entry ' + tipo;
  d.innerHTML = `<span class="ts">${new Date().toLocaleTimeString('pt-BR')}</span>${msg}`;
  el.prepend(d);
}

function atualizarPreview(){
  const el = document.getElementById('kb-preview-text');
  if(textoAcumulado){
    el.style.color = '#e2e8f0';
    el.textContent = textoAcumulado;
  } else {
    el.style.color = '#4a5568';
    el.textContent = 'Digite e pressione ↵ para enviar...';
  }
}

conectarTecnico();

function conectarTecnico(){
  ws = new WebSocket(`${SERVER}?papel=tecnico`);
  ws.onopen = () => {
    setStatus(true);
    log('Painel conectado', 'ev');
    if (deviceAtual) {
      setTimeout(() => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ tipo: 'conectar_cliente', deviceToken: deviceAtual }));
          log('Reconectando ao cliente anterior...', 'ev');
        }
      }, 1000);
    }
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch(msg.tipo){
      case 'lista_clientes': renderizarClientes(msg.clientes); break;
      case 'sessao_iniciada':
        deviceAtual = msg.deviceToken;
        atualizarDispositivo(msg.info);
        abrirPainel();
        log('Sessão iniciada', 'ev');
        break;
      case 'stream_iniciado':
        iniciarStreamUI();
        log('Stream ativo', 'ev');
        break;
      case 'frame_tela': mostrarFrame(msg.frame); break;
      case 'cliente_desconectou': log('Cliente desconectou', 'err'); break;
    }
  };
  ws.onclose = () => { setStatus(false); setTimeout(conectarTecnico, 3000); };
}

function renderizarClientes(clientes){
  const el = document.getElementById('lista-clientes');
  if(!clientes || clientes.length === 0){
    el.innerHTML = '<div class="sem-clientes"><i class="ti ti-device-mobile-off"></i>Nenhum cliente conectado</div>';
    return;
  }
  el.innerHTML = clientes.map(c => `
    <div class="cliente-card">
      <div class="cliente-info">
        <strong>${c.info?.modelo || 'Dispositivo desconhecido'}</strong><br>
        ${c.info?.android||''} &nbsp;|&nbsp; Bateria: ${c.info?.bateria||'—'} &nbsp;|&nbsp; ${c.info?.wifi||'—'}
        ${c.emAtendimento ? ' &nbsp;<span style="color:#68d391">● Em atendimento</span>' : ''}
      </div>
      <button class="btn-atender" onclick="atenderCliente('${c.deviceToken}')">
        <i class="ti ti-headset"></i> Atender
      </button>
    </div>
  `).join('');
}

function atenderCliente(deviceToken){
  ws.send(JSON.stringify({ tipo: 'conectar_cliente', deviceToken }));
}

function abrirPainel(){
  document.getElementById('tela-clientes').style.display = 'none';
  document.getElementById('tela-painel').style.display = 'flex';
  document.getElementById('btn-voltar').style.display = 'block';
  document.getElementById('session-id-top').textContent = `Token: ${deviceAtual}`;
}

function iniciarStreamUI(){
  streaming = true;
  document.getElementById('stream-icon').className = 'ti ti-player-pause';
  document.getElementById('stream-label').textContent = 'Parar';
}

function voltarLista(){
  deviceAtual = null; streaming = false;
  document.getElementById('tela-painel').style.display = 'none';
  document.getElementById('tela-clientes').style.display = 'flex';
  document.getElementById('btn-voltar').style.display = 'none';
  document.getElementById('stream-img').style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('stream-icon').className = 'ti ti-player-play';
  document.getElementById('stream-label').textContent = 'Stream';
}

function send(msg){
  if(!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify(msg));
}

function sendCmd(cmd){ send({ tipo:'cmd', cmd }); log(`→ cmd ${cmd}`); }

function handleToque(e){
  const rect = e.currentTarget.getBoundingClientRect();
  const xPct = ((e.clientX - rect.left) / rect.width * 100).toFixed(2);
  const yPct = ((e.clientY - rect.top)  / rect.height * 100).toFixed(2);
  send({ tipo:'toque', x:+xPct, y:+yPct, largura: dispositivoLargura||1080, altura: dispositivoAltura||2340 });
}

function kbTap(char){
  textoAcumulado += char;
  atualizarPreview();
}

function kbSpecial(key){
  if(key === 'del'){
    textoAcumulado = textoAcumulado.slice(0, -1);
    atualizarPreview();
  } else if(key === 'limpar'){
    textoAcumulado = '';
    atualizarPreview();
  }
}

function enviarTextoAcumulado(){
  if(textoAcumulado){
    send({ tipo:'texto', valor: textoAcumulado });
    log(`→ enviou: ${textoAcumulado}`, 'ev');
    textoAcumulado = '';
    atualizarPreview();
  }
}

function toggleStream(){
  streaming = !streaming;
  send({ tipo: streaming ? 'stream_start' : 'stream_stop' });
  document.getElementById('stream-icon').className = streaming ? 'ti ti-player-pause' : 'ti ti-player-play';
  document.getElementById('stream-label').textContent = streaming ? 'Parar' : 'Stream';
}

function mostrarFrame(base64){
  const img = document.getElementById('stream-img');
  img.src = 'data:image/jpeg;base64,' + base64;
  img.style.display = 'block';
  document.getElementById('placeholder').style.display = 'none';
}

function atualizarDispositivo(info){
  if(!info) return;
  document.getElementById('d-bat').textContent = info.bateria||'—';
  document.getElementById('d-ram').textContent = info.ram||'—';
  document.getElementById('d-wifi').textContent = info.wifi||'—';
  document.getElementById('d-os').textContent = info.android||'—';
  document.getElementById('d-model').textContent = info.modelo||'—';
  if(info.largura && info.altura){
    dispositivoLargura = parseInt(info.largura);
    dispositivoAltura  = parseInt(info.altura);
    document.getElementById('d-res').textContent = `${dispositivoLargura}×${dispositivoAltura}`;
    const ratio = dispositivoAltura / dispositivoLargura;
    const wrap = document.getElementById('device-wrap');
    wrap.style.width = '210px';
    wrap.style.height = Math.round(210 * ratio) + 'px';
  }
}

function encerrar(){ send({tipo:'encerrar'}); voltarLista(); log('Sessão encerrada','err'); }
function setStatus(online){
  const b = document.getElementById('status-badge');
  b.className = 'status ' + (online?'online':'offline');
  b.innerHTML = `<span class="dot"></span> ${online?'Conectado':'Desconectado'}`;
}
</script>
</body>
</html>
